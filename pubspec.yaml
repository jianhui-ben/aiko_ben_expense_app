name: aiko_ben_expense_app
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  provider: ^6.1.5
  flutter_spinkit: ^5.2.2
  google_fonts: ^6.3.3
  intl: ^0.20.2
  uuid: ^4.5.3
  syncfusion_flutter_charts: ^33.2.12
  percent_indicator: ^4.2.5
  image_picker: ^1.2.2
  flutter_local_notifications: ^19.4.0
  flutter_time_picker_spinner: ^2.0.0
  google_sign_in: ^6.3.0
  timezone: ^0.10.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.7.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png

  fonts:
    - family: RockSalt
      fonts:
        - asset: assets/fonts/RockSalt-Regular.ttf

dependency_overrides:
  win32: ^5.15.0
